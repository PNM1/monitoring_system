services:
  postgres:
    image: postgres:15
    container_name: store_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - store_network
  php:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    container_name: store_php
    ports:
      - "80:80"
    volumes:
      - ./frontend:/var/www/html/
      - ./backend:/var/www/html/backend
      - ./mock:/var/www/html/mock
    networks:
      - store_network

  adminer:
    image: adminer:latest
    container_name: store_adminer
    ports:
      - "9004:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    networks:
      - store_network
    depends_on:
      - postgres

networks:
  store_network:
    driver: bridge

volumes:
  postgres_data: